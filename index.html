<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#4f46e5" />
    <title>NexusAI — AI-Powered Productivity Platform</title>
    <meta name="description" content="Supercharge your workflow with AI. NexusAI automates tasks, streamlines collaboration, and delivers insights — so you can focus on what matters." />
    <meta name="keywords" content="AI productivity, task automation, team collaboration, artificial intelligence, workflow optimization" />
    <meta name="author" content="NexusAI" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://nexusai.com" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NexusAI — AI-Powered Productivity Platform" />
    <meta property="og:description" content="Supercharge your workflow with AI. Automate tasks, streamline collaboration, and deliver insights." />
    <meta property="og:url" content="https://nexusai.com" />
    <meta property="og:site_name" content="NexusAI" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NexusAI — AI-Powered Productivity Platform" />
    <meta name="twitter:description" content="Supercharge your workflow with AI. Automate tasks, streamline collaboration, and deliver insights." />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "NexusAI",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web",
      "description": "AI-powered productivity platform that automates tasks and streamlines collaboration.",
      "offers": {
        "@type": "AggregateOffer",
        "lowPrice": "0",
        "highPrice": "79",
        "priceCurrency": "USD"
      }
    }
    </script>

    <!-- Preconnect to Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    
    <!-- Font loaded async to prevent render blocking -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" /></noscript>

    <!-- Inline critical CSS to prevent FOUC -->
    <style>
      html { scroll-behavior: smooth; }
      body { 
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        margin: 0;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }
    </style>
  </head>
  <body>
    <!-- No-JS fallback -->
    <noscript>
      <div style="padding: 2rem; text-align: center; font-family: system-ui, sans-serif;">
        <h1>NexusAI</h1>
        <p>Please enable JavaScript to use this application.</p>
      </div>
    </noscript>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
